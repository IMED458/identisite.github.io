<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDENTISITE Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <header class="topbar">
    <div class="container row">
      <div>
        <h1>IDENTISITE ადმინისტრირება</h1>
        <p class="small">კონტენტის მართვა Firebase-ის გარეშე (Local რეჟიმი)</p>
      </div>
      <button id="logout-btn" class="ghost" type="button">გასვლა</button>
    </div>
  </header>

  <main class="container grid cols-2">
    <section class="card">
      <div class="tabs">
        <button class="tab active" data-tab="settings" type="button">ძირითადი ტექსტები</button>
        <button class="tab" data-tab="services" type="button">სერვისები</button>
        <button class="tab" data-tab="portfolio" type="button">პორტფოლიო</button>
        <button class="tab" data-tab="blog" type="button">ბლოგი</button>
        <button class="tab" data-tab="faq" type="button">FAQ</button>
      </div>

      <section id="tab-settings" class="tab-panel">
        <h2>საიტის ძირითადი პარამეტრები</h2>
        <form id="settings-form" class="grid">
          <div><label for="hero_title">Hero სათაური</label><input id="hero_title" name="hero_title"></div>
          <div><label for="hero_subtitle">Hero ქვესათაური</label><textarea id="hero_subtitle" name="hero_subtitle"></textarea></div>
          <div><label for="contact_email">კონტაქტის ელფოსტა</label><input id="contact_email" name="contact_email" type="email"></div>
          <div><label for="contact_phone">კონტაქტის ტელეფონი</label><input id="contact_phone" name="contact_phone"></div>
          <button class="primary" type="submit">შენახვა</button>
          <p id="settings-msg" class="small"></p>
        </form>
      </section>

      <section id="tab-services" class="tab-panel hidden">
        <h2>სერვისის დამატება/რედაქტირება</h2>
        <form id="services-form" class="grid" data-kind="services">
          <input type="hidden" name="id">
          <div><label>სათაური</label><input name="title" required></div>
          <div><label>აღწერა</label><textarea name="description"></textarea></div>
          <div><label>ფიჩერი 1</label><input name="feature_1"></div>
          <div><label>ფიჩერი 2</label><input name="feature_2"></div>
          <div><label>ღილაკის ტექსტი</label><input name="cta_text" value="შეკვეთა"></div>
          <button class="primary" type="submit">შენახვა</button>
          <p class="small" data-msg></p>
        </form>
      </section>

      <section id="tab-portfolio" class="tab-panel hidden">
        <h2>პორტფოლიოს ელემენტი</h2>
        <form id="portfolio-form" class="grid" data-kind="portfolio">
          <input type="hidden" name="id">
          <div><label>პროექტის სახელი</label><input name="title" required></div>
          <div><label>კატეგორია</label><input name="category"></div>
          <div><label>ტექნოლოგიები (comma)</label><input name="tech_stack"></div>
          <div><label>გარე ლინკი</label><input name="project_url" type="url"></div>
          <div><label>ფოტო</label><input name="imageFile" type="file" accept="image/*"></div>
          <button class="primary" type="submit">შენახვა</button>
          <p class="small" data-msg></p>
        </form>
      </section>

      <section id="tab-blog" class="tab-panel hidden">
        <h2>ბლოგის პოსტი</h2>
        <form id="blog-form" class="grid" data-kind="blog">
          <input type="hidden" name="id">
          <div><label>სათაური</label><input name="title" required></div>
          <div><label>თარიღი</label><input name="date" type="date"></div>
          <div><label>კითხვის დრო</label><input name="read_time" placeholder="5 წუთი"></div>
          <div><label>მოკლე აღწერა</label><textarea name="excerpt"></textarea></div>
          <div><label>სრული ტექსტი</label><textarea name="content"></textarea></div>
          <div><label>ფოტო</label><input name="imageFile" type="file" accept="image/*"></div>
          <button class="primary" type="submit">შენახვა</button>
          <p class="small" data-msg></p>
        </form>
      </section>

      <section id="tab-faq" class="tab-panel hidden">
        <h2>FAQ ჩანაწერი</h2>
        <form id="faq-form" class="grid" data-kind="faq">
          <input type="hidden" name="id">
          <div><label>კითხვა</label><input name="question" required></div>
          <div><label>პასუხი</label><textarea name="answer" required></textarea></div>
          <button class="primary" type="submit">შენახვა</button>
          <p class="small" data-msg></p>
        </form>
      </section>
    </section>

    <section class="card">
      <h2 id="list-title">ჩანაწერები</h2>
      <div id="admin-list" class="list"></div>
    </section>
  </main>

  <script type="module" src="../assets/js/admin.js"></script>
</body>
</html>
