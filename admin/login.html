<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/giotai/telavitheatre/main/vaja%20logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main class="login-wrap">
    <section class="card login-card">
      <h1>ადმინ ავტორიზაცია</h1>
      <p class="small">წვდომა მხოლოდ პირდაპირი URL-ით.</p>
      <form id="login-form" class="grid">
        <div>
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="primary" type="submit">შესვლა</button>
        <p id="login-error" class="small"></p>
      </form>
    </section>
  </main>
  <script type="module" src="../assets/js/admin.js"></script>
</body>
</html>
