<!doctype html>
<html lang="ka" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>8 მარტის საიტის გენერატორი</title>
  <link rel="icon" type="image/png" href="identisite.png">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    * { font-family: 'Noto Sans Georgian', sans-serif; }
  </style>
</head>
<body class="h-full bg-white">
  <div id="loadingOverlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-white/85 backdrop-blur-sm">
    <div class="text-center">
      <div class="text-6xl mb-4 animate-bounce">⏳</div>
      <p class="text-slate-700 text-lg font-medium">იტვირთება...</p>
      <p class="text-slate-500 text-sm mt-1">გთხოვ დაელოდე, ვქმნით შენს ბმულს</p>
    </div>
  </div>
  <header class="py-14 px-6 bg-gradient-to-br from-pink-50 via-white to-rose-50">
    <div class="max-w-5xl mx-auto text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-slate-800">8 მარტის საიტის გენერატორი</h1>
      <p class="text-slate-600 mt-4 text-lg">აირჩიე შაბლონი, ატვირთე ფოტო/ვიდეო, ჩაწერე ტექსტები და მიიღე მზა ლინკი.</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <div class="grid lg:grid-cols-2 gap-8">
      <form id="giftForm" class="bg-white border border-slate-200 rounded-2xl p-6 space-y-4 shadow-sm">
        <div>
          <label class="block mb-1 font-medium text-slate-700">შაბლონი *</label>
          <select name="templateType" class="w-full border rounded-xl px-4 py-3" required>
            <option value="girlfriend">შეყვარებულისთვის</option>
            <option value="wife">მეუღლისთვის</option>
          </select>
        </div>

        <div>
          <label class="block mb-1 font-medium text-slate-700">საიტის სახელი (slug) *</label>
          <input id="slug" name="slug" class="w-full border rounded-xl px-4 py-3" placeholder="mag: nino-8marti" required>
          <p id="slugError" class="text-sm text-red-600 mt-1 hidden"></p>
        </div>

        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block mb-1 font-medium text-slate-700">მიმღების სახელი *</label>
            <input name="recipientName" class="w-full border rounded-xl px-4 py-3" required>
          </div>
          <div>
            <label class="block mb-1 font-medium text-slate-700">გამგზავნის სახელი *</label>
            <input name="senderName" class="w-full border rounded-xl px-4 py-3" required>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block mb-1 font-medium text-slate-700">Hero სათაური</label>
            <input name="heroTitle" class="w-full border rounded-xl px-4 py-3" placeholder="მაგ: ჩემო სიყვარულო">
          </div>
          <div>
            <label class="block mb-1 font-medium text-slate-700">Hero ქვესათაური</label>
            <input name="heroSubtitle" class="w-full border rounded-xl px-4 py-3" placeholder="მაგ: ეს გვერდი შენთვის შევქმენი">
          </div>
        </div>

        <div>
          <label class="block mb-1 font-medium text-slate-700">სიყვარულის ტექსტი *</label>
          <textarea name="loveMessage" rows="4" class="w-full border rounded-xl px-4 py-3" required></textarea>
        </div>

        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block mb-1 font-medium text-slate-700">ჩვენი ისტორია</label>
            <textarea name="ourStory" rows="3" class="w-full border rounded-xl px-4 py-3"></textarea>
          </div>
          <div>
            <label class="block mb-1 font-medium text-slate-700">მოგონება (მეუღლის შაბლონი)</label>
            <textarea name="memoryStory" rows="3" class="w-full border rounded-xl px-4 py-3"></textarea>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block font-medium text-slate-700">მიზეზები</label>
            <button id="addReasonBtn" type="button" class="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50">+ დამატება</button>
          </div>
          <div id="reasonsWrap" class="grid md:grid-cols-2 gap-4">
            <input name="reason" class="w-full border rounded-xl px-4 py-3" placeholder="მიზეზი 1" required>
          </div>
        </div>

        <div>
          <label class="block mb-1 font-medium text-slate-700">საბოლოო ტექსტი</label>
          <textarea name="finalMessage" rows="3" class="w-full border rounded-xl px-4 py-3"></textarea>
        </div>

        <div>
          <label class="block mb-1 font-medium text-slate-700">პაემანზე მოწვევის ტექსტი</label>
          <textarea name="dateInviteText" rows="3" class="w-full border rounded-xl px-4 py-3" placeholder="მაგ: პარასკევს 20:00-ზე გიწვევ ვახშმად"></textarea>
        </div>

        <div>
          <label class="block mb-1 font-medium text-slate-700">მუსიკის ბმული (YouTube/Spotify)</label>
          <input name="musicLink" class="w-full border rounded-xl px-4 py-3">
        </div>

        <div class="grid md:grid-cols-3 gap-4">
          <div class="md:col-span-2">
            <label class="block mb-1 font-medium text-slate-700">გადახდის ლინკი (არჩევითი)</label>
            <input name="paymentLink" class="w-full border rounded-xl px-4 py-3" placeholder="https://...">
          </div>
          <div>
            <label class="block mb-1 font-medium text-slate-700">ფასი (არჩევითი)</label>
            <input name="paymentAmount" class="w-full border rounded-xl px-4 py-3" placeholder="50">
          </div>
        </div>

        <div>
          <label class="block mb-1 font-medium text-slate-700">ფოტოები (მაქს 15)</label>
          <input id="photos" name="photos" type="file" accept="image/*,.heic,.HEIC,.heif,.HEIF" multiple class="w-full border rounded-xl px-4 py-3">
        </div>

        <div>
          <label class="block mb-1 font-medium text-slate-700">ვიდეო (1 ფაილი)</label>
          <input id="video" name="video" type="file" accept="video/*" class="w-full border rounded-xl px-4 py-3">
        </div>

        <button id="submitBtn" type="submit" class="w-full bg-gradient-to-r from-pink-600 to-rose-500 text-white font-semibold py-4 rounded-xl">გენერაცია</button>
        <p id="formStatus" class="text-sm text-slate-500"></p>
      </form>

      <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6">
        <h3 class="text-2xl font-bold text-slate-800">შედეგი</h3>
        <p class="text-slate-600 mt-2">გენერაციის შემდეგ აქ გამოჩნდება ბმული და QR.</p>

        <div class="mt-6 p-4 bg-white rounded-xl border">
          <div class="text-sm text-slate-500">URL preview</div>
          <div id="urlPreview" class="font-medium text-slate-800 mt-1 break-all">/gift-view.html?slug=...</div>
        </div>

        <div id="successBox" class="hidden mt-6 p-4 bg-white rounded-xl border border-green-200">
          <div class="text-green-700 font-semibold">✅ მზადაა!</div>
          <a id="resultLink" href="#" target="_blank" class="text-pink-600 underline break-all"></a>
          <canvas id="qrCanvas" class="mt-4 border rounded"></canvas>
        </div>

        <div id="errorBox" class="hidden mt-6 p-4 bg-white rounded-xl border border-red-200 text-red-700"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import {
      firebaseReady,
      giftSlugExists,
      saveGiftPage,
      uploadGiftAsset,
      pullSettingsFromCloud
    } from './assets/js/firebase-data.js';

    const slugEl = document.getElementById('slug');
    const photosEl = document.getElementById('photos');
    const videoEl = document.getElementById('video');
    const slugErrorEl = document.getElementById('slugError');
    const urlPreviewEl = document.getElementById('urlPreview');
    const form = document.getElementById('giftForm');
    const submitBtn = document.getElementById('submitBtn');
    const formStatus = document.getElementById('formStatus');
    const successBox = document.getElementById('successBox');
    const resultLink = document.getElementById('resultLink');
    const qrCanvas = document.getElementById('qrCanvas');
    const errorBox = document.getElementById('errorBox');
    const heroTitleEl = form.querySelector('input[name="heroTitle"]');
    const addReasonBtn = document.getElementById('addReasonBtn');
    const reasonsWrap = document.getElementById('reasonsWrap');
    const loadingOverlay = document.getElementById('loadingOverlay');
    let paymentUnlocked = false;
    let paymentCheckoutUrl = '';
    let paymentAmount = '';
    let paymentCurrency = 'GEL';

    function isValidSlug(slug) {
      return /^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(slug);
    }

    function normalizeHeroTitle(value = '') {
      const raw = String(value || '').trim();
      if (!raw) return 'ჩემო სიყვარულო';
      if (raw === 'ჩემი სიყვარული') return 'ჩემო სიყვარულო';
      return raw;
    }

    function renderPaymentGate() {
      let gate = document.getElementById('paymentGate');
      if (!gate) {
        gate = document.createElement('div');
        gate.id = 'paymentGate';
        gate.className = 'rounded-2xl border border-emerald-200 bg-emerald-50 p-4';
        gate.innerHTML = `
          <div class="flex items-start justify-between gap-3 flex-wrap">
            <div>
              <p class="font-semibold text-emerald-800">გადახდა გენერაციამდე</p>
              <p id="paymentGateText" class="text-emerald-700 text-sm mt-1"></p>
            </div>
            <a id="payNowBtn" href="#" target="_blank" rel="noopener" class="inline-flex items-center px-4 py-2 rounded-lg bg-emerald-600 text-white font-medium hover:bg-emerald-700">გადახდა</a>
          </div>
          <p id="paymentGateStatus" class="text-sm mt-3"></p>
        `;
        submitBtn.parentNode.insertBefore(gate, submitBtn);
      }

      const textEl = document.getElementById('paymentGateText');
      const statusEl = document.getElementById('paymentGateStatus');
      const payBtn = document.getElementById('payNowBtn');
      if (textEl) {
        textEl.textContent = paymentAmount ? `თანხა: ${paymentAmount} ${paymentCurrency}.` : 'გადაიხადე და დაბრუნდი გენერაციაზე.';
      }
      if (payBtn) {
        payBtn.href = paymentCheckoutUrl || '#';
        payBtn.classList.toggle('pointer-events-none', !paymentCheckoutUrl);
        payBtn.classList.toggle('opacity-50', !paymentCheckoutUrl);
      }
      if (statusEl) {
        statusEl.textContent = paymentUnlocked ? '✅ გადახდა დადასტურებულია. შეგიძლია გენერაცია.' : '⏳ ჯერ გადაიხადე, შემდეგ გააგრძელე.';
        statusEl.className = paymentUnlocked ? 'text-sm mt-3 text-emerald-700' : 'text-sm mt-3 text-amber-700';
      }
    }

    async function initPaymentGate() {
      const params = new URLSearchParams(window.location.search);
      const justPaid = params.get('paid') === '1';
      if (justPaid) {
        localStorage.setItem('gift_payment_unlocked', '1');
      }
      paymentUnlocked = localStorage.getItem('gift_payment_unlocked') === '1';

      try {
        const settings = await pullSettingsFromCloud();
        paymentCheckoutUrl = String(settings?.gift_payment_checkout_url || '').trim();
        paymentAmount = String(settings?.gift_payment_amount || '').trim();
        paymentCurrency = String(settings?.gift_payment_currency || 'GEL').trim() || 'GEL';
      } catch (_) {
        // no-op fallback
      }

      renderPaymentGate();
      submitBtn.disabled = !paymentUnlocked;
    }

    function collectReasons() {
      return Array.from(reasonsWrap.querySelectorAll('input[name="reason"]'))
        .map((el) => String(el.value || '').trim())
        .filter(Boolean);
    }

    function addReasonField(value = '') {
      const count = reasonsWrap.querySelectorAll('input[name="reason"]').length + 1;
      const input = document.createElement('input');
      input.name = 'reason';
      input.className = 'w-full border rounded-xl px-4 py-3';
      input.placeholder = `მიზეზი ${count}`;
      input.value = value;
      reasonsWrap.appendChild(input);
    }

    addReasonBtn?.addEventListener('click', () => {
      addReasonField('');
    });

    slugEl.addEventListener('input', () => {
      const slug = slugEl.value.trim();
      urlPreviewEl.textContent = slug ? `/gift-view.html?slug=${slug}` : '/gift-view.html?slug=...';
      localStorage.setItem('gift_last_slug', slug);
      if (!slug || isValidSlug(slug)) {
        slugErrorEl.classList.add('hidden');
        slugErrorEl.textContent = '';
      } else {
        slugErrorEl.classList.remove('hidden');
        slugErrorEl.textContent = 'მხოლოდ a-z, 0-9 და დეფისი (-)';
      }
    });

    // Restore last entered site name and title.
    const restoredSlug = localStorage.getItem('gift_last_slug') || '';
    if (restoredSlug && !slugEl.value) {
      slugEl.value = restoredSlug;
      urlPreviewEl.textContent = `/gift-view.html?slug=${restoredSlug}`;
    }
    const restoredHeroTitle = localStorage.getItem('gift_last_hero_title') || '';
    if (heroTitleEl && restoredHeroTitle && !heroTitleEl.value) {
      heroTitleEl.value = restoredHeroTitle;
    }
    heroTitleEl?.addEventListener('input', () => {
      localStorage.setItem('gift_last_hero_title', heroTitleEl.value || '');
    });

    initPaymentGate();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      successBox.classList.add('hidden');

      if (!firebaseReady) {
        errorBox.textContent = 'Firebase არ ჩაიტვირთა';
        errorBox.classList.remove('hidden');
        return;
      }

      if (!paymentUnlocked) {
        errorBox.textContent = 'ჯერ საჭიროა გადახდის დასრულება.';
        errorBox.classList.remove('hidden');
        return;
      }

      const slug = slugEl.value.trim();
      if (!slug || !isValidSlug(slug)) {
        slugErrorEl.classList.remove('hidden');
        slugErrorEl.textContent = 'საიტის სახელი არასწორია';
        return;
      }

      submitBtn.disabled = true;
      formStatus.textContent = 'იტვირთება Cloudinary + Firebase...';
      loadingOverlay.classList.remove('hidden');
      loadingOverlay.classList.add('flex');

      try {
        const alreadyExists = await giftSlugExists(slug);
        if (alreadyExists) {
          throw new Error('ეს საიტის სახელი უკვე დაკავებულია');
        }

        const photos = Array.from(photosEl.files || []);
        if (photos.length > 15) {
          throw new Error('მაქსიმუმ 15 ფოტო');
        }
        const video = (videoEl.files || [])[0] || null;

        const photoUrls = [];
        for (const file of photos) {
          const url = await uploadGiftAsset(slug, file, 'photos');
          photoUrls.push(url);
        }

        let videoUrl = '';
        if (video) {
          videoUrl = await uploadGiftAsset(slug, video, 'video');
        }

        const fd = new FormData(form);
        const reasons = collectReasons();
        const payload = {
          slug,
          templateType: fd.get('templateType') || 'girlfriend',
          recipientName: fd.get('recipientName') || '',
          senderName: fd.get('senderName') || '',
          heroTitle: normalizeHeroTitle(fd.get('heroTitle') || ''),
          heroSubtitle: fd.get('heroSubtitle') || '',
          loveMessage: fd.get('loveMessage') || '',
          ourStory: fd.get('ourStory') || '',
          memoryStory: fd.get('memoryStory') || '',
          reason1: reasons[0] || '',
          reason2: reasons[1] || '',
          reason3: reasons[2] || '',
          reason4: reasons[3] || '',
          reason5: reasons[4] || '',
          finalMessage: fd.get('finalMessage') || '',
          dateInviteText: fd.get('dateInviteText') || '',
          musicLink: fd.get('musicLink') || '',
          paymentLink: fd.get('paymentLink') || '',
          paymentAmount: fd.get('paymentAmount') || '',
          paymentCurrency: 'GEL',
          photoUrls,
          photos: photoUrls,
          images: photoUrls,
          videoUrl,
          media: {
            photoUrls,
            photos: photoUrls,
            videoUrl
          },
          createdAt: new Date().toISOString()
        };

        await saveGiftPage(slug, payload);
        localStorage.setItem('gift_last_slug', slug);
        localStorage.setItem('gift_last_hero_title', payload.heroTitle);
        localStorage.removeItem('gift_payment_unlocked');
        paymentUnlocked = false;
        submitBtn.disabled = true;
        renderPaymentGate();

        const generatedUrl = `${window.location.origin}/gift-view.html?slug=${encodeURIComponent(slug)}`;
        resultLink.href = generatedUrl;
        resultLink.textContent = generatedUrl;
        new QRious({ element: qrCanvas, value: generatedUrl, size: 220 });
        successBox.classList.remove('hidden');
        formStatus.textContent = '✅ დასრულდა';
      } catch (err) {
        errorBox.textContent = err.message || 'ქსელის შეცდომა';
        errorBox.classList.remove('hidden');
        formStatus.textContent = '';
      } finally {
        submitBtn.disabled = !paymentUnlocked;
        loadingOverlay.classList.add('hidden');
        loadingOverlay.classList.remove('flex');
      }
    });
  </script>
</body>
</html>
